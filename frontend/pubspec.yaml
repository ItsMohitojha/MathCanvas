name: mathcanvas
description: A mobile-first offline-first mathematical canvas application.
version: 1.0.0+1

publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^14.2.0

  # Network HTTP Client
  dio: ^5.4.3

  # Local Database
  sqflite: ^2.3.3
  path_provider: ^2.1.3
  path: ^1.9.0
  shared_preferences: ^2.2.2

  # Serialization annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # UI / Icons / SVG
  cupertino_icons: ^1.0.6
  vector_math: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  sqflite_common_ffi: ^2.3.0+2

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.3.9

  # Linter
  flutter_lints: ^3.0.1
